<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Reino da Aventura - Emanuel</title>
<style>
body { margin:0; overflow:hidden; background:#8fd3ff; font-family:Arial; }

canvas { display:block; }

#startScreen, #winScreen {
position:absolute;
width:100%; height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(#8fd3ff,#ffffff);
z-index:10;
}

button {
padding:20px 40px;
font-size:22px;
border:none;
border-radius:10px;
cursor:pointer;
background:orange;
}

#footer {
position:absolute;
bottom:0;
width:100%;
background:rgba(0,0,0,0.65);
color:white;
font-size:13px;
padding:10px;
line-height:1.4;
}

#whats {
position:absolute;
top:15px;
right:15px;
background:#25D366;
color:white;
padding:10px;
border-radius:8px;
text-decoration:none;
}
</style>
</head>
<body>

<div id="startScreen">
<h1>👑 Reino da Aventura do Emanuel</h1>
<button onclick="startGame()">START</button>
</div>

<div id="winScreen" style="display:none">
<h1>🏁 FASE CONCLUÍDA!</h1>
<p>Você venceu a missão do Reino dos Cogumelos!</p>
</div>

<a id="whats" target="_blank">WhatsApp</a>

<canvas id="game"></canvas>

<div id="footer">
🎂 Aniversário do Emanuel | 18 de julho | 17h às 21h | Varginha/MG<br>
🎮 Pule obstáculos, derrote o chefão e descubra o mapa final da missão!
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------- AUDIO ----------
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function sound(freq, time=0.1){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = freq;
  o.type = "square";
  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + time);
  o.stop(audioCtx.currentTime + time);
}

let game = false;

// ---------- PLAYER SPRITE ----------
let frame = 0;

let player = {
x:80,
y:0,
vy:0,
w:40,
h:40,
ground:canvas.height-120,
jumping:false
};

player.y = player.ground;

// ---------- PARALLAX ----------
let bg1 = 0, bg2 = 0, bg3 = 0;

// ---------- OBSTACLES ----------
let obstacles = [];
for(let i=0;i<50;i++){
obstacles.push({x:300+i*220,y:player.ground});
}

// ---------- BOSS ----------
let boss = {x:12000,y:player.ground-60,hp:5,active:false};

// ---------- DRAW PLAYER PIXEL ----------
function drawPlayer(){
frame++;

ctx.fillStyle="#000";
ctx.fillRect(player.x,player.y,40,40);

// olhos animados
ctx.fillStyle="white";
ctx.fillRect(player.x+8,player.y+10,6,6);
ctx.fillRect(player.x+22,player.y+10,6,6);

// animação perna
ctx.fillStyle="brown";
if(frame%20<10){
ctx.fillRect(player.x+10,player.y+30,8,10);
ctx.fillRect(player.x+22,player.y+30,8,6);
}else{
ctx.fillRect(player.x+10,player.y+30,8,6);
ctx.fillRect(player.x+22,player.y+30,8,10);
}
}

// ---------- BACKGROUND ----------
function drawParallax(){
bg1 -= 0.5;
bg2 -= 1;
bg3 -= 2;

ctx.fillStyle="#bfe9ff";
ctx.fillRect(0,0,canvas.width,canvas.height);

// layer 1 clouds
ctx.fillStyle="white";
for(let i=0;i<10;i++){
ctx.beginPath();
ctx.arc((i*200+bg1)%canvas.width,100,30,0,Math.PI*2);
ctx.fill();
}

// layer 2 hills
ctx.fillStyle="#7ec850";
for(let i=0;i<8;i++){
ctx.fillRect((i*300+bg2)%canvas.width,canvas.height-200,200,100);
}

// layer 3 mountains
ctx.fillStyle="#4c8b5e";
for(let i=0;i<6;i++){
ctx.fillRect((i*400+bg3)%canvas.width,canvas.height-250,250,150);
}
}

// ---------- OBSTACLES ----------
function drawObstacles(){
ctx.fillStyle="green";
obstacles.forEach(o=>{
o.x -= 5;
ctx.fillRect(o.x,o.y,30,30);

if(
player.x < o.x+30 &&
player.x+40 > o.x &&
player.y < o.y+30 &&
player.y+40 > o.y
){
sound(120,0.2);
location.reload();
}
});
}

// ---------- BOSS ----------
function drawBoss(){
if(boss.x < canvas.width) boss.active=true;

if(boss.active){
ctx.fillStyle="red";
ctx.fillRect(boss.x, boss.y, 80, 80);

boss.x -= 2;

if(
player.x < boss.x+80 &&
player.x+40 > boss.x &&
player.y < boss.y+80 &&
player.y+40 > boss.y
){
boss.hp--;
sound(80,0.3);
player.vy = -12;

if(boss.hp<=0){
boss.x = -9999;

// abre mapa
setTimeout(()=>{
window.location.href =
"https://www.google.com/maps/search/?api=1&query=Av+Santo+Afonso+90+Varginha+MG";
},1000);
}
}
}
}

// ---------- UPDATE ----------
function update(){
if(!game) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

drawParallax();

// chão
ctx.fillStyle="#8B5A2B";
ctx.fillRect(0,canvas.height-80,canvas.width,100);

// physics
player.vy += 0.8;
player.y += player.vy;

if(player.y > player.ground){
player.y = player.ground;
player.vy = 0;
player.jumping=false;
}

drawObstacles();
drawBoss();
drawPlayer();

requestAnimationFrame(update);
}

// ---------- JUMP ----------
function jump(){
if(player.y >= player.ground){
player.vy = -15;
sound(300,0.1);
}
}

// ---------- CONTROLS ----------
document.addEventListener("keydown",e=>{
if(e.code==="Space") jump();
});
document.addEventListener("touchstart",jump);

// ---------- START ----------
function startGame(){
document.getElementById("startScreen").style.display="none";
game=true;
update();
}

// ---------- WHATS ----------
document.getElementById("whats").href =
"https://wa.me/5534999999999?text=" +
encodeURIComponent(
"Confirmo presença no aniversário do Emanuel. Nome da criança: Emanuel. Estou ciente da entrega no local do evento."
);

</script>

</body>
</html>
