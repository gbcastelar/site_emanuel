<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emanuel - Reino dos Cogumelos</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Press Start 2P', cursive;
    background: linear-gradient(#4fc3f7,#b3e5fc);
    overflow:hidden;
    color:white;
}

/* START SCREEN */
#startScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    color:#ffd700;
}

#startScreen h1{
    font-size:18px;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0.4;}
}

/* HUD */
.hud{
    text-align:center;
    padding:10px;
}

.title{
    font-size:14px;
    color:#ffd700;
    text-shadow:3px 3px #000;
}

/* CARD */
.card{
    width:90%;
    margin:auto;
    background:#111;
    border:6px solid #ffd700;
    padding:12px;
    border-radius:15px;
    text-align:center;
    max-height:70vh;
    overflow:auto;
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:15px;
    padding:12px;
    background:#25d366;
    color:#fff;
    border-radius:10px;
    text-decoration:none;
    font-size:10px;
}

/* MAP */
.map{
    width:100%;
    height:160px;
    margin-top:10px;
    border:3px solid #000;
}

/* COIN */
.coin{
    position:absolute;
    font-size:22px;
    animation:fall 1s linear forwards;
}

@keyframes fall{
    from{transform:translateY(0);}
    to{transform:translateY(300px);opacity:0;}
}

/* PLAYER */
#player{
    position:absolute;
    bottom:80px;
    left:50%;
    font-size:30px;
}

/* FIREWORK */
.firework{
    position:absolute;
    font-size:30px;
    animation:boom 1s ease-out forwards;
}

@keyframes boom{
    0%{transform:scale(0);}
    100%{transform:scale(2);opacity:0;}
}

/* POWER UP */
.power{
    position:fixed;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    font-size:40px;
    opacity:0;
    animation:pop 1s ease-out;
}

@keyframes pop{
    0%{transform:scale(0);}
    50%{opacity:1;}
    100%{transform:scale(2);opacity:0;}
}
</style>
</head>

<body onclick="dropCoins(event)">

<!-- START SCREEN -->
<div id="startScreen">
    <h1>🎮 PRESS START 🎮</h1>
    <button onclick="startGame()" style="
        margin-top:20px;
        padding:10px;
        font-family:monospace;
        background:#000;
        color:#ffd700;
        border:2px solid #ffd700;
    ">START</button>
</div>

<!-- POWER UP -->
<div id="power" class="power">🍄 POWER UP!</div>

<div class="hud">
    <div class="title">🍄 REINO DOS COGUMELOS - EMANUEL 🍄</div>
</div>

<div class="card">

<p>
🎮 MISSÃO: ANIVERSÁRIO DO EMANUEL<br><br>

📅 18/07<br>
🕔 17h - 21h<br>
📍 Varginha/MG<br><br>

👨‍👩‍👧 Importante: As crianças devem ser deixadas no local pelos responsáveis e retiradas ao final do evento.<br><br>

Prepare-se para a aventura!
</p>

<div id="map" class="map"></div>

<a class="btn"
href="https://wa.me/5535988916747?text=Confirmo%20a%20presença%20da%20criança%20no%20aniversário%20do%20Emanuel.%20Estou%20ciente%20de%20que%20devo%20deixar%20e%20retirar%20no%20local."
target="_blank">
▶ CONFIRMAR PRESENÇA
</a>

<button onclick="startMusic()" style="
margin-top:10px;
padding:8px;
background:#000;
color:#fff;
border:2px solid #ffd700;
font-size:10px;
">
▶ MÚSICA 8-BIT
</button>

</div>

<div id="player">🏃‍♂️</div>

<script>

document.getElementById("map").innerHTML =
`<iframe width="100%" height="160"
src="https://www.google.com/maps?q=Av.+Santo+Afonso+90+Varginha+MG&output=embed"></iframe>`;

/* START GAME */
function startGame(){
    document.getElementById("startScreen").style.display="none";
    powerUp();
}

/* POWER UP */
function powerUp(){
    const p = document.getElementById("power");
    p.style.animation="pop 1s ease-out";
}

/* MOEDA */
let audioCtx;
function coinSound(){
    if(!audioCtx){
        audioCtx = new AudioContext();
    }
    let o = audioCtx.createOscillator();
    let g = audioCtx.createGain();

    o.type="square";
    o.frequency.value=1200;

    g.gain.value=0.1;

    o.connect(g);
    g.connect(audioCtx.destination);

    o.start();
    o.stop(audioCtx.currentTime+0.1);
}

/* CLICK COINS */
function dropCoins(e){
    coinSound();

    for(let i=0;i<5;i++){
        let c=document.createElement("div");
        c.className="coin";
        c.innerHTML="🪙";
        c.style.left=e.clientX+"px";
        c.style.top=e.clientY+"px";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),1000);
    }
}

/* PLAYER MOVEMENT */
let player=document.getElementById("player");
let x=window.innerWidth/2;

document.addEventListener("keydown",function(e){
    if(e.key==="ArrowLeft") x-=20;
    if(e.key==="ArrowRight") x+=20;
    player.style.left=x+"px";
});

/* MUSIC */
let ctx;
function startMusic(){
    if(!ctx) ctx=new AudioContext();

    let notes=[262,330,392,523,392,330];
    let t=ctx.currentTime;

    for(let i=0;i<60;i++){
        let o=ctx.createOscillator();
        let g=ctx.createGain();

        o.type="square";
        o.frequency.value=notes[i%notes.length];

        g.gain.value=0.05;

        o.connect(g);
        g.connect(ctx.destination);

        o.start(t+i*0.2);
        o.stop(t+i*0.2+0.1);
    }
}

/* FIREWORK TIMER */
setInterval(()=>{
    let now=new Date();
    let event=new Date("2026-07-18T17:00:00");
    let diff=event-now;

    if(diff<3600000 && diff>0){
        firework();
    }
},10000);

function firework(){
    for(let i=0;i<10;i++){
        let f=document.createElement("div");
        f.className="firework";
        f.innerHTML="🎆";
        f.style.left=Math.random()*window.innerWidth+"px";
        f.style.top=Math.random()*window.innerHeight+"px";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),1000);
    }
}

</script>

</body>
</html>
