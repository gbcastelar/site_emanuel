<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emanuel Dino Game</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Press Start 2P', cursive;
    background:#8fd3ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* CONTAINER CENTRAL */
#gameContainer{
    width:900px;
    height:600px;
    position:relative;
    background:#a6ddff;
    border:4px solid #000;
    overflow:hidden;
}

/* INTRO */
#intro{
    position:absolute;
    width:100%;
    height:100%;
    background:#111;
    color:#ffd700;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

/* HUD */
#hud{
    position:absolute;
    top:10px;
    left:10px;
    font-size:12px;
    color:#000;
    z-index:5;
}

/* PLAYER */
#player{
    position:absolute;
    bottom:120px;
    left:60px;
    font-size:30px;
}

/* CHÃO */
#ground{
    position:absolute;
    bottom:100px;
    width:100%;
    height:4px;
    background:#000;
}

/* OBSTÁCULO */
.obstacle{
    position:absolute;
    bottom:120px;
    font-size:22px;
}

/* MOEDA */
.coin{
    position:absolute;
    font-size:18px;
}

/* CONVITE */
#panel{
    position:absolute;
    bottom:0;
    width:100%;
    height:120px;
    background:#222;
    color:#fff;
    font-size:11px;
    padding:10px;
    line-height:1.4;
    overflow:auto;
}

.btn{
    display:inline-block;
    margin-top:8px;
    padding:8px;
    background:#25d366;
    color:#fff;
    text-decoration:none;
    font-size:10px;
}
</style>
</head>

<body>

<div id="gameContainer">

<!-- INTRO -->
<div id="intro">
    <h1>🎮 EMANUEL DINO GAME 🎮</h1>
    <button onclick="startGame()">START</button>
</div>

<!-- HUD -->
<div id="hud">
PONTOS: <span id="score">0</span><br>
VIDAS: <span id="lives">3</span>
</div>

<!-- GAME AREA -->
<div id="player">🦖</div>
<div id="ground"></div>

<!-- CONVITE -->
<div id="panel">

👑🍄 CONVITE OFICIAL DO REINO DOS COGUMELOS 🍄👑<br>
📅 18/07 | 🕔 17h às 21h | 📍 Varginha/MG<br><br>

👨‍👩‍👧 Crianças devem ser deixadas e retiradas pelos responsáveis.<br><br>

🎮 Pressione ESPAÇO, ENTER ou toque na tela para pular!

<br>

<a class="btn"
href="https://wa.me/5535988916747?text=Confirmo%20a%20presença%20da%20criança%20no%20evento%20do%20Emanuel.%20Estou%20ciente%20de%20que%20devo%20deixar%20e%20retirar%20no%20local."
target="_blank">
CONFIRMAR PRESENÇA
</a>

</div>

</div>

<script>

/* ================= STATE ================= */
let started=false;
let score=0;
let lives=3;
let jumping=false;

const player=document.getElementById("player");

/* ================= START ================= */
function startGame(){
    document.getElementById("intro").style.display="none";
    started=true;
    loop();
}

/* ================= JUMP ================= */
function jump(){
    if(jumping) return;
    jumping=true;

    let up=0;

    let t=setInterval(()=>{
        up+=6;
        player.style.bottom=(120+up)+"px";

        if(up>=120){
            clearInterval(t);

            let down=setInterval(()=>{
                up-=6;
                player.style.bottom=(120+up)+"px";

                if(up<=0){
                    clearInterval(down);
                    jumping=false;
                    player.style.bottom="120px";
                }
            },20);
        }
    },20);
}

/* ================= CONTROLS FIXED ================= */
document.addEventListener("keydown",(e)=>{
    if(e.code==="Space" || e.code==="Enter"){
        e.preventDefault();
        jump();
    }
});

/* TOQUE NA TELA */
document.addEventListener("touchstart",()=>{
    jump();
});

/* CLIQUE NA TELA */
document.addEventListener("click",()=>{
    jump();
});

/* ================= SCORE ================= */
function update(){
    document.getElementById("score").innerText=score;
    document.getElementById("lives").innerText=lives;
}

/* ================= OBSTÁCULO ================= */
function spawnObstacle(){
    if(!started) return;

    let o=document.createElement("div");
    o.className="obstacle";
    o.innerHTML="👾";
    o.style.left="900px";
    document.getElementById("gameContainer").appendChild(o);

    let x=900;

    let move=setInterval(()=>{
        x-=6;
        o.style.left=x+"px";

        if(x<120 && x>60){
            if(!jumping){
                lives--;
                update();
            }
        }

        if(x<-50){
            o.remove();
            clearInterval(move);
            score++;
            update();
        }
    },20);
}

/* ================= COIN ================= */
function spawnCoin(){
    if(!started) return;

    let c=document.createElement("div");
    c.className="coin";
    c.innerHTML="🪙";
    c.style.left="900px";
    c.style.bottom="160px";

    document.getElementById("gameContainer").appendChild(c);

    let x=900;

    let move=setInterval(()=>{
        x-=6;
        c.style.left=x+"px";

        if(x<120 && x>60){
            score+=2;
            update();
            c.remove();
            clearInterval(move);
        }

        if(x<-50){
            c.remove();
            clearInterval(move);
        }
    },20);
}

/* ================= LOOP ================= */
function loop(){
    setInterval(spawnObstacle,1800);
    setInterval(spawnCoin,2600);
}

update();

</script>

</body>
</html>
