<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emanuel Game Party</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Press Start 2P', cursive;
    background:#000;
    overflow:hidden;
    color:white;
}

/* ================= INTRO ================= */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

#logo{
    font-size:22px;
    color:#ffd700;
    opacity:0;
    animation:fadeIn 2s forwards;
}

#loading{
    margin-top:20px;
    font-size:10px;
    opacity:0;
    animation:fadeIn 3s forwards;
}

@keyframes fadeIn{
    to{opacity:1;}
}

/* ================= HUD ================= */
#hud{
    position:fixed;
    top:10px;
    left:10px;
    font-size:10px;
    z-index:10;
}

/* ================= GAME AREA ================= */
#game{
    width:100vw;
    height:100vh;
    position:relative;
    background:linear-gradient(#4fc3f7,#b3e5fc);
}

/* PLAYER */
#player{
    position:absolute;
    bottom:60px;
    left:50%;
    font-size:30px;
}

/* COIN */
.coin{
    position:absolute;
    font-size:20px;
}

/* ENEMY */
.enemy{
    position:absolute;
    font-size:25px;
}

/* ================= CONVITE ================= */
#panel{
    position:absolute;
    bottom:0;
    width:100%;
    background:#111;
    padding:10px;
    font-size:10px;
    border-top:3px solid #ffd700;
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px;
    background:#25d366;
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <div id="logo">🎮 EMANUEL GAME PARTY 🎮</div>
    <div id="loading">LOADING WORLD...</div>
</div>

<!-- HUD -->
<div id="hud">
VIDAS: <span id="lives">3</span><br>
PONTOS: <span id="score">0</span>
</div>

<!-- GAME -->
<div id="game">

<div id="player">🏃‍♂️</div>

<div id="panel">
🎮 Missão: Festa do Emanuel<br>
📅 18/07 - 17h às 21h<br>
📍 Varginha/MG<br><br>

👨‍👩‍👧 Crianças devem ser deixadas e retiradas pelos responsáveis.<br>

<a class="btn"
href="https://wa.me/5535988916747?text=Confirmo%20a%20presença%20da%20criança%20no%20evento%20do%20Emanuel.%20Estou%20ciente%20de%20que%20devo%20deixar%20e%20retirar%20no%20local."
target="_blank">
CONFIRMAR PRESENÇA
</a>
</div>

</div>

<script>

/* ================= INTRO ================= */
setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    startGame();
},3500);

/* ================= GAME STATE ================= */
let score=0;
let lives=3;
let player=document.getElementById("player");
let x=window.innerWidth/2;

/* ================= PLAYER MOVE ================= */
document.addEventListener("keydown",(e)=>{
    if(e.key==="ArrowLeft") x-=20;
    if(e.key==="ArrowRight") x+=20;

    player.style.left=x+"px";
});

/* ================= SCORE ================= */
function addScore(){
    score++;
    document.getElementById("score").innerText=score;

    if(score%10===0){
        changeMusic();
    }
}

/* ================= LIVES ================= */
function hit(){
    lives--;
    document.getElementById("lives").innerText=lives;

    if(lives<=0){
        alert("GAME OVER - REINICIANDO");
        location.reload();
    }
}

/* ================= COINS ================= */
function spawnCoin(){
    let c=document.createElement("div");
    c.className="coin";
    c.innerHTML="🪙";
    c.style.left=Math.random()*window.innerWidth+"px";
    c.style.top="0px";

    document.getElementById("game").appendChild(c);

    let fall=setInterval(()=>{
        let top=parseInt(c.style.top);
        c.style.top=(top+5)+"px";

        if(top>window.innerHeight-120){
            if(Math.abs(top-x)<50) addScore();
            c.remove();
            clearInterval(fall);
        }
    },30);
}

/* ================= ENEMY ================= */
function spawnEnemy(){
    let e=document.createElement("div");
    e.className="enemy";
    e.innerHTML="👾";
    e.style.left=Math.random()*window.innerWidth+"px";
    e.style.top="0px";

    document.getElementById("game").appendChild(e);

    let fall=setInterval(()=>{
        let top=parseInt(e.style.top);
        e.style.top=(top+7)+"px";

        if(top>window.innerHeight-120){
            hit();
            e.remove();
            clearInterval(fall);
        }
    },30);
}

/* ================= GAME LOOP ================= */
function startGame(){
    setInterval(spawnCoin,1200);
    setInterval(spawnEnemy,2000);
    startMusic();
}

/* ================= MUSIC ================= */
let ctx;
let mode=0;

function startMusic(){
    if(!ctx) ctx=new AudioContext();
    playMusic();
}

function changeMusic(){
    mode++;
}

function playMusic(){
    let notes1=[262,330,392,523];
    let notes2=[196,220,262,330];
    let notes3=[523,659,784,1046];

    let notes=mode<2?notes1:mode<4?notes2:notes3;

    let t=ctx.currentTime;

    for(let i=0;i<30;i++){
        let o=ctx.createOscillator();
        let g=ctx.createGain();

        o.type="square";
        o.frequency.value=notes[i%notes.length];

        g.gain.value=0.05;

        o.connect(g);
        g.connect(ctx.destination);

        o.start(t+i*0.2);
        o.stop(t+i*0.2+0.1);
    }
}

/* loop música dinâmica */
setInterval(playMusic,4000);

</script>

</body>
</html>
